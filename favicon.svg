<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Guitar body -->
  <ellipse cx="16" cy="22" rx="7" ry="8" fill="#c8933a" stroke="#7a5020" stroke-width="1.2"/>
  <ellipse cx="16" cy="22" rx="4.5" ry="5.5" fill="#e8b060" opacity="0.5"/>
  <!-- Waist -->
  <path d="M9.5 19.5 Q16 17 22.5 19.5" stroke="#7a5020" stroke-width="1.2" fill="none"/>
  <!-- Sound hole -->
  <circle cx="16" cy="22" r="2" fill="#5a3010" opacity="0.7"/>
  <!-- Neck -->
  <rect x="14.5" y="6" width="3" height="14" rx="1.2" fill="#c8933a" stroke="#7a5020" stroke-width="1"/>
  <!-- Headstock -->
  <rect x="13.5" y="3" width="5" height="4" rx="1" fill="#7a5020"/>
  <!-- Tuning pegs -->
  <circle cx="13" cy="4" r="1" fill="#ccc"/>
  <circle cx="13" cy="6.5" r="1" fill="#ccc"/>
  <circle cx="19" cy="4" r="1" fill="#ccc"/>
  <circle cx="19" cy="6.5" r="1" fill="#ccc"/>
  <!-- Strings -->
  <line x1="15" y1="7" x2="14.5" y2="19" stroke="#888" stroke-width="0.5" opacity="0.8"/>
  <line x1="16" y1="7" x2="16" y2="19" stroke="#888" stroke-width="0.5" opacity="0.8"/>
  <line x1="17" y1="7" x2="17.5" y2="19" stroke="#888" stroke-width="0.5" opacity="0.8"/>
  <!-- Frets -->
  <line x1="14.5" y1="10" x2="17.5" y2="10" stroke="#7a5020" stroke-width="0.7"/>
  <line x1="14.5" y1="13" x2="17.5" y2="13" stroke="#7a5020" stroke-width="0.7"/>
  <line x1="14.5" y1="16" x2="17.5" y2="16" stroke="#7a5020" stroke-width="0.7"/>
</svg>
