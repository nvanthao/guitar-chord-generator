<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Guitar Chord Generator</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

  <style>
    html, body, #root { height: 100%; }
    body { margin: 0; background: #f0eee9; overflow: hidden; }
    * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    input::placeholder, textarea::placeholder { color: #c0c0c0; }

    @media print {
      html, body, #root { height: auto; overflow: visible; background: #fff; }
      body { background: #fff; }
      [data-noprint] { display: none !important; }
      [data-printroot] { flex: none !important; overflow: visible !important; background: #fff !important; }
      [data-printsheet] { padding: 0 !important; }
      [data-printsheet] > div:last-child { box-shadow: none !important; }
    }
    @page { size: A4; margin: 14mm; }
  </style>

</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/app.jsx"></script>
