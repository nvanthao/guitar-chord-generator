<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Guitar Chord Generator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

  <style>
    html, body, #root { height: 100%; }
    body { margin: 0; background: #f0eee9; overflow: hidden; }
    * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    input::placeholder, textarea::placeholder { color: #c0c0c0; }

    @media print {
      html, body, #root { height: auto; overflow: visible; background: #fff; }
      body { background: #fff; }
      [data-noprint] { display: none !important; }
      [data-printroot] { flex: none !important; overflow: visible !important; background: #fff !important; }
      [data-printsheet] { padding: 0 !important; }
      [data-printsheet] > div:last-child { box-shadow: none !important; }
    }
    @page { size: A4; margin: 14mm; }
  </style>

  <!-- React -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- html-to-image for PNG export -->
  <script src="https://unpkg.com/html-to-image@1.11.11/dist/html-to-image.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chord data + diagram -->
  <script src="src/chord-utils.js"></script>
  <script type="text/babel" src="src/components/chord-diagram.jsx?v=4"></script>

  <!-- Variants + app -->
  <script type="text/babel" src="src/components/variants.jsx?v=4"></script>
  <script type="text/babel" src="src/app.jsx?v=4"></script>
</body>
</html>
