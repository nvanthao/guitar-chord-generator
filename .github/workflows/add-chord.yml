name: Add Chord

on:
  workflow_dispatch:
    inputs:
      chord_name:
        description: 'Chord name (e.g. C#m7, Dm7, Asus4)'
        required: true
      frets:
        description: 'Frets E A D G B e — comma-separated, use null for muted (e.g. null,5,7,5,6,5)'
        required: true
      fingers:
        description: 'Fingers 0-4, comma-separated (e.g. 0,1,3,1,2,1). 0=open/muted, 1-4=finger number'
        required: true
      mode:
        description: 'Add a new chord or a new voicing to an existing chord'
        required: true
        default: voicing
        type: choice
        options:
          - voicing
          - chord

jobs:
  add-chord:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Add chord / voicing
        run: |
          node scripts/chord-add.js \
            "${{ inputs.mode }}" \
            "${{ inputs.chord_name }}" \
            "${{ inputs.frets }}" \
            "${{ inputs.fingers }}"

      - name: Commit and push chord-data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chord-data.json
          git commit -m "feat: add ${{ inputs.mode }} for ${{ inputs.chord_name }}"
          git push
